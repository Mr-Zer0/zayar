<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowDraft</title>
  </head>
  <body>

    <!-- Sign-in screen -->
    <div id="sign-in-screen" class="flex items-center justify-center h-screen bg-[#f5f5f5]" style="display:none">
      <div class="text-center p-10 bg-white rounded-xl border border-slate-200 min-w-[300px]">
        <h1 class="text-3xl mb-2 text-blue-600">FlowDraft</h1>
        <p class="text-gray-500 mb-4">A personal Mermaid flowchart editor</p>
        <p id="sign-in-error" class="text-[#ff6b6b] text-[13px] min-h-[18px]"></p>
        <button id="sign-in-btn">Sign in with Google</button>
      </div>
    </div>

    <!-- App (authenticated) -->
    <div id="app" class="flex flex-col h-screen" style="display:none">

      <div class="h-12 bg-white border-b border-slate-200 flex items-center px-4 gap-3 shrink-0">
        <span class="text-lg font-bold text-blue-600 flex-1">FlowDraft</span>
        <div class="flex gap-2">
          <button id="copy-link-btn">Copy link</button>
          <button id="new-project-btn">+ New project</button>
        </div>
      </div>

      <div id="main-layout" class="grid grid-cols-[260px_1fr_1fr] flex-1 overflow-hidden">

        <aside id="sidebar" class="bg-white border-r border-slate-200 flex flex-col overflow-hidden">
          <ul id="project-list" class="flex-1 overflow-y-auto py-2 list-none"></ul>
          <div class="shrink-0">
            <button 
              class="flex items-center gap-3 px-8 py-3 mb-3 hover:cursor-pointer text-slate-700 font-semibold"
              id="sign-out-btn"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-slate-500">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
              </svg>

              Log out
            </button>
          </div>
          <!-- <div class="shrink-0 border-t border-slate-200 px-5 py-2 flex items-center gap-2">
            

            <span id="user-name" class="flex-1 text-sm font-semibold text-gray-500 truncate">Log Out</span>
            <button id="sign-out-btn">Sign out</button>
          </div> -->
        </aside>

        <section class="flex flex-col border-r border-slate-200 overflow-hidden bg-white">
          <div id="preview-container" class="flex-1 overflow-auto p-4 flex items-start justify-center"></div>
          <div id="preview-error" class="bg-red-500 text-white text-xs px-3 py-1.5 whitespace-pre-wrap break-all" style="display:none"></div>
          <div class="bg-white border-t border-slate-200 px-3 py-2 flex justify-between items-center gap-2 shrink-0">
            <div class="flex gap-1.5">
              <button class="theme-btn" data-theme="default">Default</button>
              <button class="theme-btn" data-theme="forest">Forest</button>
              <button class="theme-btn" data-theme="dark">Dark</button>
              <button class="theme-btn" data-theme="neutral">Neutral</button>
            </div>
            <div class="flex gap-1.5">
              <button id="export-svg-btn">Export SVG</button>
              <button id="export-png-btn">Export PNG</button>
            </div>
          </div>
        </section>

        <section class="flex flex-col overflow-hidden bg-[#fafafa]">
          <div id="editor-container" class="flex-1 overflow-hidden"></div>
        </section>

      </div>
    </div>

    <!-- Share view (read-only, no auth required) -->
    <div id="share-view" class="flex flex-col h-screen" style="display:none">
      <div class="h-12 bg-white border-b border-slate-200 flex items-center px-4 gap-3 shrink-0">
        <span class="text-lg font-bold text-blue-600 flex-1">FlowDraft</span>
        <span class="text-xs text-gray-500 bg-slate-100 px-2.5 py-0.5 rounded-full">Read-only preview</span>
      </div>
      <div class="flex-1 flex flex-col bg-white overflow-auto">
        <div id="share-preview-container" class="flex-1 overflow-auto p-4 flex items-start justify-center"></div>
        <div id="share-preview-error" class="bg-red-500 text-white text-xs px-3 py-1.5 whitespace-pre-wrap break-all" style="display:none"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
